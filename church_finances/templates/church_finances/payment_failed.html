{% extends 'base.html' %}

{% block title %}Payment Failed - Church Books{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-xl shadow-md p-8 text-center">
        <div class="w-14 h-14 rounded-full bg-red-100 text-red-700 flex items-center justify-center mx-auto mb-4 text-2xl">!</div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Payment Could Not Be Verified</h2>
        <p class="text-sm text-gray-600 mb-6">{{ message|default:'Please try again or contact your church administrator.' }}</p>

        <a href="{% url 'donor_payment_portal' %}" class="inline-block bg-amber-600 hover:bg-amber-700 text-white font-semibold py-2 px-6 rounded-lg shadow-sm transition">Try Again</a>
    </div>
</div>
{% endblock %}
